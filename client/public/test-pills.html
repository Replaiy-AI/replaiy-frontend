<!doctype html>
<html><head><meta charset="utf-8" />
<title>Pill Comparison</title>
<style>
  body {
    background: linear-gradient(180deg, #1b1b1d 0%, #2a2a2e 100%);
    color: #e1e1e1;
    font-family: system-ui, sans-serif;
    margin: 0; padding: 80px;
  }
  .row { display: flex; gap: 60px; align-items: center; margin-bottom: 80px; }
  .label { font-size: 14px; min-width: 200px; }
  /* TAB-PILL exact structure */
  .tab-outer {
    position: relative;
    display: inline-block;
    width: 132px;
    height: 52px;
    border-radius: 9999px;
    box-shadow:
      inset 0 0 0 0.5px rgba(255,255,255,0.10),
      inset 0.97px 1.62px 0px -1.08px rgba(255,255,255,0.90),
      inset -1.08px -1.08px 0px -1.08px rgba(255,255,255,0.80),
      inset -1.62px -4.32px 0.54px -3.24px rgba(255,255,255,0.60),
      inset -0.16px -0.54px 2.16px 0px rgba(0,0,0,0.12),
      inset -0.81px 1.35px 0px -1.08px rgba(0,0,0,0.20),
      inset 0px 1.62px 2.16px -1.08px rgba(0,0,0,0.20),
      inset 1.08px -3.51px 0.54px -2.16px rgba(0,0,0,0.10),
      0px 0.54px 2.7px 0px rgba(0,0,0,0.10),
      0px 3.24px 8.65px 0px rgba(0,0,0,0.08);
  }
  .tab-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 4px 6px 5px;
    margin: 0;
    border: none;
    border-radius: 9999px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.22) 0%,
      rgba(255,255,255,0.12) 45%,
      rgba(255,255,255,0.06) 78%,
      rgba(0,0,0,0.04) 100%);
    backdrop-filter: blur(10px) saturate(1.4);
    -webkit-backdrop-filter: blur(10px) saturate(1.4);
    color: #e1e1e1;
    font-weight: 600;
  }

  /* GLASS exact structure (mine) */
  .glass-outer {
    position: relative;
    display: inline-block;
    width: 132px;
    height: 52px;
    min-width: 132px;
    max-width: 132px;
    flex-shrink: 0;
    border-radius: 26px;
    padding: 0;
    margin: 0;
    border: none;
    background: transparent;
    box-shadow:
      inset 0 0 0 0.5px rgba(255,255,255,0.10),
      inset 0.97px 1.62px 0px -1.08px rgba(255,255,255,0.90),
      inset -1.08px -1.08px 0px -1.08px rgba(255,255,255,0.80),
      inset -1.62px -4.32px 0.54px -3.24px rgba(255,255,255,0.60),
      inset -0.16px -0.54px 2.16px 0px rgba(0,0,0,0.12),
      inset -0.81px 1.35px 0px -1.08px rgba(0,0,0,0.20),
      inset 0px 1.62px 2.16px -1.08px rgba(0,0,0,0.20),
      inset 1.08px -3.51px 0.54px -2.16px rgba(0,0,0,0.10),
      0px 0.54px 2.7px 0px rgba(0,0,0,0.10),
      0px 3.24px 8.65px 0px rgba(0,0,0,0.08);
    cursor: pointer;
  }
  .glass-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    margin: 0;
    border: none;
    border-radius: 26px;
    color: #e1e1e1;
    font-weight: 600;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.22) 0%,
      rgba(255,255,255,0.12) 45%,
      rgba(255,255,255,0.06) 78%,
      rgba(0,0,0,0.04) 100%);
    backdrop-filter: blur(10px) saturate(1.4);
    -webkit-backdrop-filter: blur(10px) saturate(1.4);
    transform: scale(1);
  }
  
  .text-bg {
    font-size: 28px; opacity: 0.5; max-width: 600px; line-height: 1.3;
    position: absolute; left: 60px; right: 60px; pointer-events: none;
  }
</style></head>
<body>
  <p class="text-bg" style="top:30px">Background text that should show through the glass — Hey board prep is Friday at 4pm, can we lock the decision today?</p>
  <div style="height:120px"></div>
  
  <div class="row">
    <div class="label">VadikLiquidSwitcher style:<br/>(div + fieldset)</div>
    <div class="tab-outer">
      <fieldset class="tab-inner">↩ Reply</fieldset>
    </div>
  </div>
  
  <div class="row">
    <div class="label">VadikGlass style:<br/>(button + span)</div>
    <button class="glass-outer">
      <span class="glass-inner">↩ Reply</span>
    </button>
  </div>
  
  <div class="row">
    <div class="label">VadikGlass style:<br/>(div + span — no button!)</div>
    <div class="glass-outer">
      <span class="glass-inner">↩ Reply</span>
    </div>
  </div>
</body></html>
